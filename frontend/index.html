<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Future Interns - Mini CRM</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f4f4f4; }
    .header { background: #1e40af; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { margin: 0; font-size: 1.4em; }
    .logout-btn { background: #e74c3c; color: white; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    .container { max-width: 1100px; margin: 20px auto; padding: 20px; }
    table { width: 100%; border-collapse: collapse; background: white; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
    .btn { padding: 8px 16px; border: none; border-radius: 5px; cursor: pointer; }
    .add-btn { background: #1e40af; color: white; }
    .status-new { background: #f0ad4e; color: white; padding: 4px 10px; border-radius: 9999px; font-size: 0.85em; }
    .status-contacted { background: #5bc0de; color: white; padding: 4px 10px; border-radius: 9999px; font-size: 0.85em; }
    .status-converted { background: #5cb85c; color: white; padding: 4px 10px; border-radius: 9999px; font-size: 0.85em; }
    .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.3); z-index: 1000; width: 90%; max-width: 500px; }
    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🚀 Future Interns - Mini CRM</h1>
    <button onclick="logout()" class="logout-btn">Logout (Admin)</button>
  </div>

  <div class="container">
    <button onclick="showAddModal()" class="btn add-btn">+ Add New Lead</button>

    <table id="leadsTable">
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Source</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <!-- Add Lead Modal -->
  <div id="addModal" class="modal" style="display:none;">
    <h2>Add New Lead</h2>
    <input id="name" placeholder="Name" style="width:100%; padding:10px; margin:8px 0;"><br>
    <input id="email" placeholder="Email" style="width:100%; padding:10px; margin:8px 0;"><br>
    <input id="source" placeholder="Source (e.g. Website, LinkedIn)" style="width:100%; padding:10px; margin:8px 0;"><br>
    <button onclick="saveLead()" class="btn add-btn">Save Lead</button>
    <button onclick="hideModals()" style="margin-left:10px;">Cancel</button>
  </div>

  <!-- View Details Modal -->
  <div id="viewModal" class="modal" style="display:none;">
    <h2 id="modalName"></h2>
    <p id="modalEmail"></p>
    <label>Status: 
      <select id="statusSelect" onchange="updateStatus()">
        <option value="New">New</option>
        <option value="Contacted">Contacted</option>
        <option value="Converted">Converted</option>
      </select>
    </label><br><br>
    <h3>Notes & Follow-ups</h3>
    <div id="notesList"></div>
    <input id="newNote" placeholder="Add a new note..." style="width:100%; padding:10px; margin:8px 0;">
    <button onclick="addNote()" class="btn add-btn">Add Note</button>
    <button onclick="hideModals()" style="margin-left:10px;">Close</button>
  </div>

  <div id="overlay" class="overlay" style="display:none;" onclick="hideModals()"></div>

  <script>
    const API = 'http://localhost:5000';

    async function loadLeads() {
      const res = await fetch(`${API}/api/leads`);
      const leads = await res.json();
      const tbody = document.querySelector('#leadsTable tbody');
      tbody.innerHTML = '';
      leads.forEach(lead => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${lead.name}</td>
          <td>${lead.email}</td>
          <td>${lead.source || '-'}</td>
          <td><span class="status-${lead.status.toLowerCase()}">${lead.status}</span></td>
          <td><button class="btn" onclick="viewLead('${lead._id}')">View Details</button></td>
        `;
        tbody.appendChild(tr);
      });
    }

    async function saveLead() {
      const lead = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        source: document.getElementById('source').value
      };
      await fetch(`${API}/api/leads`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(lead)
      });
      hideModals();
      loadLeads();
    }

    let currentLeadId = null;

    async function viewLead(id) {
      currentLeadId = id;
      const res = await fetch(`${API}/api/leads`);
      const leads = await res.json();
      const lead = leads.find(l => l._id === id);

      document.getElementById('modalName').textContent = lead.name;
      document.getElementById('modalEmail').textContent = lead.email;
      document.getElementById('statusSelect').value = lead.status;

      const notesDiv = document.getElementById('notesList');
      notesDiv.innerHTML = lead.notes.map(n => `<p><strong>${new Date(n.date).toLocaleString()}</strong>: ${n.text}</p>`).join('');

      document.getElementById('viewModal').style.display = 'block';
      document.getElementById('overlay').style.display = 'block';
    }

    async function addNote() {
      const noteText = document.getElementById('newNote').value;
      if (!noteText) return;
      await fetch(`${API}/api/leads/${currentLeadId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ note: noteText })
      });
      document.getElementById('newNote').value = '';
      viewLead(currentLeadId);
      loadLeads();
    }

    async function updateStatus() {
      const status = document.getElementById('statusSelect').value;
      await fetch(`${API}/api/leads/${currentLeadId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status })
      });
      loadLeads();
    }

    function hideModals() {
      document.getElementById('addModal').style.display = 'none';
      document.getElementById('viewModal').style.display = 'none';
      document.getElementById('overlay').style.display = 'none';
    }

    function showAddModal() {
      document.getElementById('addModal').style.display = 'block';
      document.getElementById('overlay').style.display = 'block';
    }

    function logout() {
      if (confirm('Logout as Admin?')) {
        alert('✅ Logged out successfully!');
        window.location.reload();
      }
    }

    window.onload = loadLeads;
  </script>
</body>
</html>
